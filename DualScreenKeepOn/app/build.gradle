apply plugin: 'com.android.application'

android {
    namespace 'com.dualscreen.keepon'
    compileSdk 35

    defaultConfig {
        applicationId 'com.dualscreen.keepon'
        minSdk 35
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Xposed API 以源码存根形式提供，编译时使用，运行时由 LSPosed 框架提供
    // 不需要额外依赖
}
